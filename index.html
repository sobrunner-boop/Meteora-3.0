<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>Meteora Order 3.0</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <button id="logoBtn" class="brand" title="Admin versteckt">🏛️ <span id="restaurantName">Meteora Order</span></button>
    <div id="statusLine" class="status">Offline bereit</div>
  </header>
  <main id="app"></main>
  <dialog id="modal">
    <form method="dialog" class="modal-card">
      <div id="modalContent"></div>
      <div class="modal-actions"><button value="cancel" class="btn ghost">Schließen</button></div>
    </form>
  </dialog>
  <input id="importFile" type="file" accept="application/json" hidden>
  <script src="app.js"></script>
</body>
</html>
